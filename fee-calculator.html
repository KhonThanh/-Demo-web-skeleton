<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon | Tính phí</title>
    <link rel="icon" type="image/png" href="./img/logo/logo-favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css" />
    <link rel="stylesheet" href="../css/style.min.css">
    <!-- <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/custom.css">
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/utility.css"> -->
</head>

<body>
    <header class="container-f" data-include="./component/header.html"></header>
    <main class="container-f flex flex-col center-hor">
        <section class="flex bg-gray container-f">
            <div class=" container-l nav-bar__container">
                <a href="javascript:void(0)" class="nav-bar__item">Trang chủ</a>
                <a href="javascript:void(0)" class="nav-bar__item">Tính phí thử</a>
            </div>
        </section>
        <section class="container-f container-padding bg-white-second flex center-hor">
            <div class="container-l flex gap-20 flex-wrap">
                <div class="col-section-2 flex-1 flex flex-col gap-20">
                    <h1 class="text-header-size bold text-color-primary">Tính phí thử</h1>
                    <form class="js-validate-form calc-form-custom bg-white custom-item flex flex-wrap gap-20"
                        data-form="calculate-fee" style="padding: 30px;">
                        <div class="form-row col-2 flex flex-col gap-10">
                            <p class="bold field-label">Số lượng hóa đơn phát sinh (Hóa đơn) / tháng</p>
                            <div class="form-group flex">
                                <input type="number" name="invoice_qty" class="form-input col-1 custom-item"
                                    placeholder="Nhập số lượng..." style="padding: 10px;" required>
                            </div>
                        </div>
                        <div class="form-row col-2 flex flex-col gap-10 end-hor">
                            <p class="bold field-label">Doanh thu / (tỷ VNĐ) / tháng</p>
                            <div class="form-group flex">
                                <input type="number" name="revenue" class="form-input col-1 custom-item"
                                    placeholder="Nhập doanh thu..." style="padding: 10px;" required>
                            </div>
                        </div>
                        <div class="form-row col-2 flex flex-col gap-10">
                            <p class="bold field-label">Ngành nghề chính</p>
                            <div class="form-group flex flex-1">
                                <select name="industry" class="form-select col-1 custom-item" style="padding: 10px;"
                                    required>
                                    <option value="">Chọn ngành nghề chính</option>
                                    <option value="trade">Thương mại</option>
                                    <option value="service">Dịch vụ</option>
                                    <option value="production">Sản xuất</option>
                                    <option value="construction">Xây dựng</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row col-2 flex flex-col gap-10">
                            <p class="bold field-label">Số lao động / ( người )</p>
                            <div class="form-group flex flex-1">
                                <input type="number" name="staff_qty" class="form-input col-1 custom-item"
                                    placeholder="Nhập số lao động..." style="padding: 10px;" required>
                            </div>
                        </div>
                        <div class="form-row col-2 flex flex-col gap-10">
                            <p class="bold field-label">Đăng ký BHYT, BHXH</p>
                            <div class="form-group flex flex-1">
                                <select name="insurance" class="form-select col-1 custom-item" style="padding: 10px;"
                                    required>
                                    <option value="no">Không đăng ký</option>
                                    <option value="yes">Có đăng ký</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row col-2 flex flex-col gap-10">
                            <p class="bold field-label">Chi nhánh VPĐD</p>
                            <div class="form-group flex flex-1">
                                <select name="branch" class="form-select col-1 custom-item" style="padding: 10px;"
                                    required>
                                    <option value="no">Không</option>
                                    <option value="yes">Có</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row col-2 flex flex-col gap-10">
                            <p class="bold field-label">Địa điểm công ty</p>
                            <div class="form-group flex">
                                <select name="location" class="form-select col-1 custom-item" style="padding: 10px;"
                                    required>
                                    <option value="hcm">Trong tp HCM</option>
                                    <option value="other">Ngoài tp HCM</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row col-2 flex flex-col gap-10">
                            <p class="bold field-label">Loại hình doanh nghiệp</p>
                            <div class="form-group flex">
                                <select name="company_type" class="form-select col-1 custom-item" style="padding: 10px;"
                                    required>
                                    <option value="tnhh">TNHH, DNTN</option>
                                    <option value="joint_stock">Công ty cổ phần</option>
                                    <option value="fdi">Vốn đầu tư nước ngoài (FDI)</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-1 flex">
                            <button type="submit"
                                class="btn-submit-calc bg-secondary text-color-white btn-custom-fit cursor-pointer"
                                style="padding: 12px 30px; border: none; font-weight: bold;">
                                Thành tiền
                            </button>
                        </div>
                    </form>
                </div>

                <div class="col-section-2 flex-1 flex">
                    <img src="./img/service/calculator.jpg" alt="Tính phí thử" class="custom-item img-content col-1">
                </div>
            </div>
        </section>
    </main>
    <footer class="container-f bg-white center-ver" data-include="./component/footer.html"></footer>
    <section class="btntotop__container pos-fixed bg-white" data-include="./component/rolltotop.html" id="btnToTop">
    </section>
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.11.0.min.js"></script>
    <script type="text/javascript" src="https://code.jquery.com/jquery-migrate-1.2.1.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script type="text/javascript" src="./js/frontend.js"></script>
</body>

</html>
