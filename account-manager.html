<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon | Quản lý tài khoản</title>
    <link rel="icon" type="image/png" href="./img/logo/logo-favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css" />
    <link rel="stylesheet" href="../css/style.min.css">
    <!-- <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/custom.css">
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/utility.css"> -->
</head>

<body>
    <header class="container-f" data-include="./component/header.html"></header>
    <main class="container-f flex flex-col center-hor">
        <section class="flex bg-gray container-f">
            <div class="container-l nav-bar__container">
                <a href="javascript:void(0)" class="nav-bar__item">Trang chủ</a>
                <a href="javascript:void(0)" class="nav-bar__item">Quản lý tài khoản</a>
            </div>
        </section>
        <section class="container-f flex center-ver container-padding">
            <div class="auth-section container-l flex flex-col gap-20">
                <h3 class="auth-title">Quản lý tài khoản</h3>
                <form class="js-validate-form flex flex-col gap-20" data-form="account">
                    <p>Tài khoản</p>
                    <div class="form-group flex">
                        <input type="text" name="username" value="nguyenvana" required>
                        <small class="error-msg"></small>
                    </div>
                    <p>Số điện thoại</p>
                    <div class="form-group flex">
                        <input type="tel" name="phone" value="0912345678" required>
                        <small class="error-msg"></small>
                    </div>
                    <p>Email</p>
                    <div class="form-group flex">
                        <input type="email" name="email" value="example@gmail.com" required>
                        <small class="error-msg"></small>
                    </div>
                    <p>Địa chỉ</p>
                    <div class="form-group flex">
                        <input type="text" name="address" value="Hồ Chí Minh">
                        <small class="error-msg"></small>
                    </div>
                    <div class="flex gap-20 jus-sb">
                        <button type="submit" class="btn-update account-manager__btn">
                            Sửa
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer class="container-f bg-white center-ver" data-include="./component/footer.html"></footer>
    <section class="cta-floating container-s flex gap-20" data-include="./component/cta-floating.html"></section>
    <section class="btntotop__container pos-fixed bg-white" data-include="./component/rolltotop.html" id="btnToTop">
        <script type="text/javascript" src="https://code.jquery.com/jquery-1.11.0.min.js"></script>
        <script type="text/javascript" src="https://code.jquery.com/jquery-migrate-1.2.1.min.js"></script>
        <script type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
        <script type="text/javascript" src="./js/frontend.js"></script>
</body>

</html>
